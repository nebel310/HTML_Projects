<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black & White</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Кнопка входа (видна до авторизации) -->
    <button id="loginBtn" class="btn-auth" style="display:none;">Войти через GitHub</button>

    <!-- Основное приложение (скрыто до авторизации) -->
    <div class="app" id="app" style="display:none;">
        <div class="input-area" id="inputArea">
            <div class="input-row">
                <div class="input-text-wrap">
                    <input
                        type="text"
                        class="input-text"
                        id="taskInput"
                        placeholder="Новая задача"
                        autocomplete="off"
                        maxlength="300"
                    >
                </div>
                <input
                    type="datetime-local"
                    class="input-deadline"
                    id="deadlineInput"
                    title="Дедлайн (опционально)"
                >
                <button class="btn-add" id="btnAdd" title="Добавить задачу" aria-label="Добавить задачу">+</button>
            </div>
        </div>

        <div class="task-list" id="taskList" role="list" aria-label="Список задач"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalText">
            <p class="modal-text" id="modalText">Вы точно хотите удалить?</p>
            <div class="modal-buttons">
                <button class="btn-modal btn-modal-confirm" id="modalConfirm">Да</button>
                <button class="btn-modal btn-modal-cancel" id="modalCancel">Нет</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, update, onValue, remove } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
        import { getAuth, signInWithPopup, GithubAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCX9IqXD7GBLt0Zmw1znFknpIUOzGZSYh8",
            authDomain: "expo-tasks-todo.firebaseapp.com",
            databaseURL: "https://expo-tasks-todo-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "expo-tasks-todo",
            storageBucket: "expo-tasks-todo.firebasestorage.app",
            messagingSenderId: "1067819928796",
            appId: "1:1067819928796:web:1dc24f17a28fc195d53819"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // Пробрасываем в глобальную область для scripts.js
        window.firebaseApp = app;
        window.firebaseDb = db;
        window.firebaseAuth = auth;
    </script>

    <script src="scripts.js"></script>
</body>
</html>
